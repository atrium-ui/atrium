<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calendar View</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        background: #1a1a1e;
        color: #fff;
        font-family: system-ui, -apple-system, sans-serif;
        overflow: hidden;
      }

      #app {
        width: 100%;
        height: 100%;
      }

      calendar-view {
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <calendar-view locale="de-DE"></calendar-view>
    </div>

    <script type="module">
      import "./src/index.ts";

      const calendar = document.querySelector("calendar-view");

      // iCal parser - converts VCALENDAR format to event objects
      function parseICalDate(dateStr) {
        if (!dateStr) return null;
        // Handle formats: 20231215T100000Z, 20231215T100000, 20231215
        const clean = dateStr.replace(/[^0-9T]/g, "");
        const year = parseInt(clean.slice(0, 4), 10);
        const month = parseInt(clean.slice(4, 6), 10) - 1;
        const day = parseInt(clean.slice(6, 8), 10);

        if (clean.includes("T")) {
          const hour = parseInt(clean.slice(9, 11), 10);
          const minute = parseInt(clean.slice(11, 13), 10);
          const second = parseInt(clean.slice(13, 15), 10) || 0;
          if (dateStr.endsWith("Z")) {
            return new Date(Date.UTC(year, month, day, hour, minute, second));
          }
          return new Date(year, month, day, hour, minute, second);
        }
        return new Date(year, month, day);
      }

      function unfoldICalLines(text) {
        // iCal spec: lines can be folded by inserting CRLF + space/tab
        return text.replace(/\r?\n[ \t]/g, "");
      }

      function parseICalEvents(icalText) {
        const unfolded = unfoldICalLines(icalText);
        const lines = unfolded.split(/\r?\n/);
        const events = [];
        let currentEvent = null;

        const color = (() => {
          const colors = ["#9b59b6", "#e74c3c", "#3498db", "#2ecc71", "#f39c12", "#1abc9c", "#e91e63"];
          return colors[Math.floor(Math.random() * colors.length)];
        })();

        for (const line of lines) {
          const trimmed = line.trim();
          if (trimmed === "BEGIN:VEVENT") {
            currentEvent = {};
          } else if (trimmed === "END:VEVENT" && currentEvent) {
            if (currentEvent.start) {
              events.push({
                id: currentEvent.uid || String(Math.random()),
                title: currentEvent.summary || "Untitled Event",
                start: currentEvent.start,
                end: currentEvent.end || currentEvent.start,
                color,
              });
            }
            currentEvent = null;
          } else if (currentEvent) {
            const colonIdx = trimmed.indexOf(":");
            if (colonIdx === -1) continue;

            const keyPart = trimmed.slice(0, colonIdx);
            const value = trimmed.slice(colonIdx + 1);
            const key = keyPart.split(";")[0];

            switch (key) {
              case "SUMMARY":
                currentEvent.summary = value;
                break;
              case "DTSTART":
                currentEvent.start = parseICalDate(value);
                break;
              case "DTEND":
                currentEvent.end = parseICalDate(value);
                break;
              case "UID":
                currentEvent.uid = value;
                break;
            }
          }
        }
        return events;
      }

      async function fetchICalEvents(url) {
        const response = await fetch(url);
        if (!response.ok) {
          throw new Error(`Failed to fetch iCal: ${response.status}`);
        }
        const text = await response.text();
        return parseICalEvents(text);
      }

      // Generate some sample events
      const today = new Date();
      const events = [
        {
          id: "1",
          title: "Team Standup",
          start: new Date(today.getFullYear(), today.getMonth(), today.getDate(), 9, 0),
          end: new Date(today.getFullYear(), today.getMonth(), today.getDate(), 9, 30),
          color: "#9b59b6",
        },
        {
          id: "2",
          title: "Project Review",
          start: new Date(today.getFullYear(), today.getMonth(), today.getDate(), 14, 0),
          end: new Date(today.getFullYear(), today.getMonth(), today.getDate(), 15, 30),
          color: "#e74c3c",
        },
        {
          id: "3",
          title: "Lunch with Team",
          start: new Date(today.getFullYear(), today.getMonth(), today.getDate(), 12, 0),
          end: new Date(today.getFullYear(), today.getMonth(), today.getDate(), 13, 0),
          color: "#3498db",
        },
        {
          id: "4",
          title: "Design Workshop",
          start: new Date(today.getFullYear(), today.getMonth(), today.getDate() + 1, 10, 0),
          end: new Date(today.getFullYear(), today.getMonth(), today.getDate() + 1, 12, 0),
          color: "#2ecc71",
        },
        {
          id: "5",
          title: "Sprint Planning",
          start: new Date(today.getFullYear(), today.getMonth(), today.getDate() + 2, 9, 0),
          end: new Date(today.getFullYear(), today.getMonth(), today.getDate() + 2, 11, 0),
          color: "#f39c12",
        },
        {
          id: "6",
          title: "Client Call",
          start: new Date(today.getFullYear(), today.getMonth(), today.getDate() - 1, 15, 0),
          end: new Date(today.getFullYear(), today.getMonth(), today.getDate() - 1, 16, 0),
          color: "#1abc9c",
        },
        {
          id: "7",
          title: "Code Review",
          start: new Date(today.getFullYear(), today.getMonth(), today.getDate() + 3, 14, 0),
          end: new Date(today.getFullYear(), today.getMonth(), today.getDate() + 3, 15, 0),
          color: "#9b59b6",
        },
        {
          id: "8",
          title: "Team Offsite",
          start: new Date(today.getFullYear(), today.getMonth(), today.getDate() + 7, 9, 0),
          end: new Date(today.getFullYear(), today.getMonth(), today.getDate() + 7, 17, 0),
          color: "#e91e63",
        },
      ];

      calendar.events = events;

      // Fetch additional events from iCal URL
      fetchICalEvents("/work.ics").then((icalEvents) => {
        calendar.events = [...calendar.events, ...icalEvents];
      });
      fetchICalEvents("/planning.ics").then((icalEvents) => {
        calendar.events = [...calendar.events, ...icalEvents];
      });
      fetchICalEvents("/social.ics").then((icalEvents) => {
        calendar.events = [...calendar.events, ...icalEvents];
      });
      fetchICalEvents("/s-v.ics").then((icalEvents) => {
        calendar.events = [...calendar.events, ...icalEvents];
      });

      calendar.addEventListener("selection", (e) => {
        console.log("Selection:", e.detail);
        const title = prompt("New event title:");
        if (title) {
          const newEvent = {
            id: String(Date.now()),
            title,
            start: e.detail.start,
            end: e.detail.end,
            color: "#9b59b6",
          };
          calendar.events = [...calendar.events, newEvent];
        }
      });

      calendar.addEventListener("event-click", (e) => {
        console.log("Event clicked:", e.detail);
        alert(`Event: ${e.detail.title}\nStart: ${e.detail.start}\nEnd: ${e.detail.end}`);
      });
    </script>
  </body>
</html>
